services:
  postgres:
    image: postgres
    container_name: my-postgresql-container
    environment:
      POSTGRES_USER: developer # The PostgreSQL user (useful to connect to the database)
      POSTGRES_PASSWORD: Password01 # The PostgreSQL password (useful to connect to the database)
      POSTGRES_DB: default_database # The PostgreSQL default database (automatically created at first launch)
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data 
    restart: always
    networks:
      - hlavoj-net
 
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - hlavoj-net
 
volumes:
  postgres-data:

networks:
  hlavoj-net:
    external: true